# Cloudflare Workers — Ivy bot/proxy deploy konfiguratsiyasi
# Deploy: `wrangler deploy` (shu papkada) yoki repo'ni Cloudflare Workers Builds'ga ulang.
# Secret'lar dashboard yoki `wrangler secret put NOMI` orqali qo'yiladi (bu faylga YOZILMAYDI).

name = "ivy"
main = "cloudflare-worker.js"
compatibility_date = "2024-09-01"
workers_dev = true

# Maxfiy bo'lmagan o'zgaruvchilar (xohlasangiz):
# [vars]
# GROQ_MODEL = "llama-3.3-70b-versatile"

# Secret'lar (kodga/faylga yozilmaydi — alohida o'rnatiladi):
#   wrangler secret put BOT_TOKEN
#   wrangler secret put FIREBASE_CLIENT_EMAIL
#   wrangler secret put FIREBASE_PRIVATE_KEY
#   wrangler secret put GROQ_API_KEY        # (ixtiyoriy — AI suhbat)
#   wrangler secret put WEBHOOK_SECRET      # (ixtiyoriy — webhook himoyasi)
