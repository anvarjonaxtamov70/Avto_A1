<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Foto Albom · 3D</title>
    <meta name="theme-color" content="#05030a">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Haqiqiy 3D dvigatel (WebGL) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --accent: #e9c877;
            --accent-soft: #fbeec6;
            --accent-rgb: 233, 200, 119;
            --glass: rgba(255,255,255,0.05);
            --glass-brd: rgba(255,255,255,0.12);
        }
        html, body {
            height: 100%; overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background: #05030a; color: #f5efe0;
            user-select: none; -webkit-user-select: none;
        }

        /* Chuqurlikdagi nebula fon (canvas orqasida) */
        #bg {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(90% 70% at 50% 30%, #1b1226 0%, #0a0712 45%, #05030a 100%);
        }
        #bg::before {
            content: ""; position: absolute; inset: -20%;
            background:
                radial-gradient(closest-side at 25% 35%, rgba(var(--accent-rgb),0.14), transparent),
                radial-gradient(closest-side at 78% 68%, rgba(140,110,255,0.12), transparent);
            filter: blur(40px);
            animation: bgdrift 24s ease-in-out infinite alternate;
        }
        @keyframes bgdrift { from { transform: translate(-2%, -1%) scale(1); } to { transform: translate(3%, 2%) scale(1.08); } }
        #bg::after {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(120% 120% at 50% 50%, transparent 55%, rgba(0,0,0,0.6) 100%);
        }

        /* WebGL canvas */
        #gl { position: fixed; inset: 0; z-index: 1; display: block; touch-action: none; }

        /* Interfeys */
        #ui { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
        .brand {
            position: absolute; top: calc(env(safe-area-inset-top) + 16px); left: 0; right: 0;
            text-align: center;
        }
        .brand .t {
            font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; letter-spacing: 5px;
            background: linear-gradient(100deg, var(--accent-soft), #fff, var(--accent));
            -webkit-background-clip: text; background-clip: text; color: transparent;
            background-size: 200% auto; animation: shine 7s linear infinite; text-transform: uppercase;
        }
        @keyframes shine { to { background-position: 200% center; } }
        .brand .s { font-size: 9px; letter-spacing: 6px; opacity: 0.5; margin-top: 4px; text-transform: uppercase; }

        /* Pastki minimal boshqaruv */
        .dock {
            position: absolute; left: 0; right: 0; bottom: calc(env(safe-area-inset-bottom) + 20px);
            display: flex; flex-direction: column; align-items: center; gap: 14px; pointer-events: none;
        }
        .rail {
            width: 46%; max-width: 260px; height: 2px; border-radius: 2px;
            background: rgba(255,255,255,0.14); position: relative; overflow: hidden;
        }
        .rail > i { position: absolute; top: 0; left: 0; height: 100%; width: 12%;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 2px; transition: transform .55s cubic-bezier(.2,.8,.2,1); }
        .nav { display: flex; align-items: center; gap: 22px; pointer-events: auto; }
        .arw {
            width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--glass-brd);
            background: var(--glass); color: var(--accent-soft); font-size: 22px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            transition: transform .18s cubic-bezier(.34,1.56,.64,1), background .2s;
        }
        .arw:active { transform: scale(0.85); background: rgba(var(--accent-rgb),0.2); }
        .count {
            font-family: 'Cormorant Garamond', serif; font-size: 17px; letter-spacing: 3px;
            color: var(--accent-soft); min-width: 84px; text-align: center;
        }
        .count b { color: #fff; font-weight: 700; }
        .hint { font-size: 9px; letter-spacing: 3px; opacity: 0.4; text-transform: uppercase; }

        /* Fullscreen ko'rish (fokus) */
        #viewer {
            position: fixed; inset: 0; z-index: 20; background: rgba(3,2,7,0.96);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity .4s ease;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        #viewer.show { opacity: 1; pointer-events: auto; }
        #viewer img {
            max-width: 94vw; max-height: 84vh; border-radius: 12px;
            box-shadow: 0 40px 120px rgba(0,0,0,0.75), 0 0 0 1px rgba(var(--accent-rgb),0.18);
            transform: scale(.86); transition: transform .45s cubic-bezier(.2,.9,.2,1);
            touch-action: none; will-change: transform;
        }
        #viewer.show img { transform: scale(1); }
        .vclose {
            position: absolute; top: calc(env(safe-area-inset-top) + 14px); right: 16px;
            width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--glass-brd);
            background: var(--glass); color: #fff; font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .vcap {
            position: absolute; bottom: calc(env(safe-area-inset-bottom) + 20px); width: 100%;
            text-align: center; font-family: 'Cormorant Garamond', serif; letter-spacing: 3px;
            color: var(--accent-soft); font-size: 15px;
        }

        /* Loading */
        #status {
            position: fixed; inset: 0; z-index: 40; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 24px; gap: 20px;
            background: radial-gradient(circle at 50% 35%, #16101f 0%, #05030a 100%);
            transition: opacity .7s ease;
        }
        .orb { width: 70px; height: 70px; position: relative; }
        .orb i {
            position: absolute; inset: 0; border-radius: 50%;
            border: 2px solid transparent; border-top-color: var(--accent);
            animation: spin 1.1s linear infinite;
        }
        .orb i:nth-child(2) { inset: 10px; border-top-color: rgba(var(--accent-rgb),0.5); animation-duration: 1.6s; animation-direction: reverse; }
        .orb i:nth-child(3) { inset: 20px; border-top-color: var(--accent-soft); animation-duration: 0.9s; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #status .big { font-size: 50px; filter: drop-shadow(0 6px 14px rgba(0,0,0,0.5)); }
        #status .msg { color: var(--accent-soft); font-size: 13px; letter-spacing: 2px; max-width: 300px; line-height: 1.7; }
        .pct { font-family: 'Cormorant Garamond', serif; font-size: 15px; letter-spacing: 2px; color: rgba(var(--accent-rgb),0.85); }

        /* Fallback (WebGL yo'q) */
        #fallback {
            position: fixed; inset: 0; z-index: 5; display: none;
            overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch; align-items: center; gap: 16px; padding: 0 12vw;
        }
        #fallback.on { display: flex; }
        #fallback .fc { flex: 0 0 auto; scroll-snap-align: center; width: 74vw; max-width: 420px; height: 74vh; }
        #fallback img { width: 100%; height: 100%; object-fit: cover; border-radius: 14px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.6); }

        .hidden { display: none !important; }
        .fade { opacity: 0 !important; }

        @media (max-width: 380px) { .brand .t { font-size: 18px; letter-spacing: 3px; } }
    </style>
</head>
<body>
    <div id="bg"></div>
    <canvas id="gl"></canvas>
    <div id="fallback"></div>

    <div id="ui">
        <div class="brand">
            <div class="t">Foto Albom</div>
            <div class="s">3D Galereya</div>
        </div>
        <div class="dock">
            <div class="rail"><i id="rail"></i></div>
            <div class="nav">
                <button class="arw" id="prev" aria-label="Oldingi">‹</button>
                <div class="count" id="count"><b>—</b> / —</div>
                <button class="arw" id="next" aria-label="Keyingi">›</button>
            </div>
            <div class="hint">Suring &nbsp;·&nbsp; rasmni bosing</div>
        </div>
    </div>

    <div id="viewer">
        <button class="vclose" id="vclose">✕</button>
        <img id="vimg" src="" alt="">
        <div class="vcap" id="vcap"></div>
    </div>

    <div id="status">
        <div class="orb"><i></i><i></i><i></i></div>
        <div class="big hidden" id="statusEmoji">📷</div>
        <div class="msg" id="statusMsg">Galereya tayyorlanmoqda…</div>
        <div class="pct" id="pct"></div>
    </div>

    <script>
    // =====================================================================
    //  WORKER — rasm ro'yxati (/list) va rasmlar (/media?id=). Bo'sh/xato
    //  bo'lsa DEMO ko'rsatiladi. Botga hech narsa qilish shart emas.
    // =====================================================================
    var WORKER_URL = "https://albom-ayman.anvaraxtamov70.workers.dev";

    var tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    if (tg) { try { tg.expand(); tg.ready(); tg.setHeaderColor && tg.setHeaderColor('#05030a'); } catch (e) {} }
    function haptic(k) { if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred(k || 'light'); } catch (e) {} } }

    var $ = function (id) { return document.getElementById(id); };
    var statusEl = $('status'), statusMsg = $('statusMsg'), statusEmoji = $('statusEmoji'), pctEl = $('pct');

    function showStatus(emoji, msg) {
        document.querySelector('.orb').classList.add('hidden'); pctEl.textContent = '';
        statusEmoji.classList.remove('hidden'); statusEmoji.textContent = emoji;
        statusMsg.textContent = msg; statusEl.classList.remove('hidden', 'fade');
    }
    function hideStatus() { statusEl.classList.add('fade'); setTimeout(function () { statusEl.classList.add('hidden'); }, 750); }

    function imageUrl(item) {
        if (typeof item === 'string') return item;
        if (item && item.url) return item.url;
        if (item && item.id && WORKER_URL) return WORKER_URL.replace(/\/$/, '') + '/media?id=' + encodeURIComponent(item.id);
        return '';
    }

    var DEMO = [
        "https://picsum.photos/id/1015/800/1000","https://picsum.photos/id/1025/800/1000",
        "https://picsum.photos/id/1039/800/1000","https://picsum.photos/id/1043/800/1000",
        "https://picsum.photos/id/1052/800/1000","https://picsum.photos/id/1062/800/1000",
        "https://picsum.photos/id/1074/800/1000","https://picsum.photos/id/1080/800/1000",
        "https://picsum.photos/id/103/800/1000","https://picsum.photos/id/110/800/1000"
    ];

    var IMG_URLS = [];

    // =====================================================================
    //  3D GALEREYA (Three.js core)
    // =====================================================================
    var G = {
        scene: null, camera: null, renderer: null, group: null,
        photos: [], N: 0, R: 6, step: 0,
        current: 0, target: 0, velocity: 0,
        dragging: false, moved: 0, lastX: 0, downX: 0, downY: 0, downT: 0,
        raycaster: null, particles: null, running: false, lastIdx: -1
    };
    var PHOTO_H = 3.0, PHOTO_W = PHOTO_H * 0.75, CAM_D = 5.4;
    var BG_COLOR = 0x08050f;

    function hasWebGL() {
        try {
            var c = document.createElement('canvas');
            return !!(window.WebGLRenderingContext && (c.getContext('webgl') || c.getContext('experimental-webgl')));
        } catch (e) { return false; }
    }

    // Yumshoq dumaloq zarra teksturasi (canvas)
    function sparkTexture() {
        var c = document.createElement('canvas'); c.width = c.height = 64;
        var x = c.getContext('2d'); var g = x.createRadialGradient(32, 32, 0, 32, 32, 32);
        g.addColorStop(0, 'rgba(255,255,255,1)'); g.addColorStop(0.3, 'rgba(255,240,200,0.6)');
        g.addColorStop(1, 'rgba(255,240,200,0)');
        x.fillStyle = g; x.fillRect(0, 0, 64, 64);
        var t = new THREE.Texture(c); t.needsUpdate = true; return t;
    }

    // Rangli "yuklanmoqda" placeholder tekstura
    function placeholderTexture(i) {
        var c = document.createElement('canvas'); c.width = 300; c.height = 400;
        var x = c.getContext('2d');
        var hue = (i * 47) % 360;
        var g = x.createLinearGradient(0, 0, 300, 400);
        g.addColorStop(0, 'hsl(' + hue + ',35%,22%)'); g.addColorStop(1, 'hsl(' + ((hue + 40) % 360) + ',35%,12%)');
        x.fillStyle = g; x.fillRect(0, 0, 300, 400);
        var t = new THREE.Texture(c); t.needsUpdate = true; t.encoding = THREE.sRGBEncoding; return t;
    }

    function initGL() {
        var canvas = $('gl');
        G.renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        G.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        G.renderer.setSize(window.innerWidth, window.innerHeight);
        G.renderer.outputEncoding = THREE.sRGBEncoding;

        G.scene = new THREE.Scene();
        G.camera = new THREE.PerspectiveCamera(44, window.innerWidth / window.innerHeight, 0.1, 100);

        G.group = new THREE.Group();
        G.scene.add(G.group);
        G.raycaster = new THREE.Raycaster();

        buildParticles();
    }

    function buildParticles() {
        var count = 220, pos = new Float32Array(count * 3);
        for (var i = 0; i < count; i++) {
            var r = 6 + Math.random() * 22, a = Math.random() * Math.PI * 2, y = (Math.random() - 0.5) * 26;
            pos[i * 3] = Math.cos(a) * r; pos[i * 3 + 1] = y; pos[i * 3 + 2] = Math.sin(a) * r;
        }
        var geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        var mat = new THREE.PointsMaterial({
            size: 0.14, map: sparkTexture(), transparent: true, opacity: 0.7,
            blending: THREE.AdditiveBlending, depthWrite: false, color: 0xffe9b8
        });
        G.particles = new THREE.Points(geo, mat);
        G.scene.add(G.particles);
    }

    function layout() {
        G.N = IMG_URLS.length;
        G.step = (Math.PI * 2) / G.N;
        // Qo'shni rasmlar ustma-ust tushmasligi uchun radius
        var chord = PHOTO_W * 1.6;
        G.R = Math.max(chord / (2 * Math.sin(G.step / 2)), PHOTO_H * 1.35);
        // Juda katta radiusni cheklaymiz (ko'p rasmlarda)
        G.R = Math.min(G.R, 26);

        var camZ = G.R + CAM_D;
        G.camera.position.set(0, 0.2, camZ);
        G.camera.lookAt(0, 0, 0);

        G.scene.fog = new THREE.Fog(BG_COLOR, CAM_D + 0.5, CAM_D + G.R * 1.7);
    }

    function buildPhotos() {
        var geo = new THREE.PlaneGeometry(PHOTO_H, PHOTO_H); // kvadrat; width scale.x bilan
        var loader = new THREE.TextureLoader();
        loader.crossOrigin = 'anonymous';
        var loaded = 0;

        for (var i = 0; i < G.N; i++) {
            (function (i) {
                var a = i * G.step;
                var mat = new THREE.MeshBasicMaterial({
                    map: placeholderTexture(i), side: THREE.FrontSide, transparent: true, toneMapped: false
                });
                var mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(G.R * Math.sin(a), 0, G.R * Math.cos(a));
                mesh.rotation.y = a;
                mesh.scale.x = PHOTO_W / PHOTO_H; // ~0.75 boshlang'ich
                mesh.userData.index = i;
                mesh.userData.baseAspect = PHOTO_W / PHOTO_H;
                G.group.add(mesh);

                // Fokusdagi rasm ortidagi porlash (ramka nuri)
                var glowMat = new THREE.MeshBasicMaterial({
                    color: 0xe9c877, transparent: true, opacity: 0, side: THREE.FrontSide,
                    blending: THREE.AdditiveBlending, depthWrite: false
                });
                var glow = new THREE.Mesh(geo, glowMat);
                glow.position.copy(mesh.position);
                glow.rotation.y = a;
                glow.scale.set(mesh.scale.x * 1.14, 1.12, 1);
                glow.position.x -= Math.sin(a) * 0.06;
                glow.position.z -= Math.cos(a) * 0.06;
                G.group.add(glow);

                G.photos.push({ mesh: mesh, glow: glow, angle: a });

                var img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = function () {
                    var tex = new THREE.Texture(img);
                    tex.needsUpdate = true; tex.encoding = THREE.sRGBEncoding;
                    tex.minFilter = THREE.LinearFilter; tex.generateMipmaps = false;
                    mat.map = tex; mat.needsUpdate = true;
                    var asp = Math.min(img.naturalWidth / img.naturalHeight, 1.3);
                    if (!asp || !isFinite(asp)) asp = 0.75;
                    mesh.userData.baseAspect = asp;
                    glow.scale.x = asp * 1.14;
                };
                img.onerror = function () { /* placeholder qoladi */ };
                img.src = IMG_URLS[i];

                // Yuklanish progressini kuzatamiz (birinchi ekranga tez o'tamiz)
                var trk = new Image();
                trk.onload = trk.onerror = function () { loaded++; pctEl.textContent = loaded + ' / ' + G.N; };
                trk.src = IMG_URLS[i];
            })(i);
        }
    }

    function updateCount() {
        var idx = ((Math.round(G.current) % G.N) + G.N) % G.N;
        if (idx !== G.lastIdx) { G.lastIdx = idx; haptic('light'); }
        $('count').innerHTML = '<b>' + String(idx + 1).padStart(2, '0') + '</b> / ' + String(G.N).padStart(2, '0');
        var p = G.N > 1 ? idx / (G.N - 1) : 0;
        var rail = $('rail'); var w = rail.parentNode.clientWidth - rail.clientWidth;
        rail.style.transform = 'translateX(' + (p * w) + 'px)';
    }

    function shortAngle(a) { a = a % (Math.PI * 2); if (a > Math.PI) a -= Math.PI * 2; if (a < -Math.PI) a += Math.PI * 2; return a; }

    var lastT = 0;
    function animate(t) {
        if (!G.running) return;
        requestAnimationFrame(animate);
        var dt = Math.min((t - lastT) / 1000 || 0.016, 0.05); lastT = t;

        // Inersiya + tekislash
        if (!G.dragging) {
            G.target += G.velocity;
            G.velocity *= 0.9;
            if (Math.abs(G.velocity) < 0.0009) {
                G.velocity = 0;
                G.target = Math.round(G.target); // snap
            }
        }
        G.current += (G.target - G.current) * Math.min(1, dt * 9);

        G.group.rotation.y = -G.current * G.step;

        // Har rasm: fokusga qarab kattalik / yorqinlik / porlash
        for (var i = 0; i < G.photos.length; i++) {
            var ph = G.photos[i];
            var world = shortAngle(ph.angle - G.current * G.step);
            var f = Math.max(0, Math.cos(world));      // fokusda 1
            var pop = 1 + 0.16 * f * f;
            var asp = ph.mesh.userData.baseAspect || 0.75;
            ph.mesh.scale.set(asp * pop, pop, 1);
            var bright = 0.42 + 0.58 * f;
            ph.mesh.material.color.setScalar(bright);
            ph.glow.material.opacity = Math.pow(f, 5) * 0.75;
            ph.glow.scale.set(asp * pop * 1.14, pop * 1.12, 1);
        }

        if (G.particles) { G.particles.rotation.y += dt * 0.02; G.particles.rotation.x = Math.sin(t / 6000) * 0.05; }

        G.renderer.render(G.scene, G.camera);
    }

    // ---------- Interaksiya ----------
    function bindEvents() {
        var canvas = $('gl');

        canvas.addEventListener('pointerdown', function (e) {
            G.dragging = true; G.moved = 0; G.velocity = 0;
            G.lastX = G.downX = e.clientX; G.downY = e.clientY; G.downT = performance.now();
            canvas.setPointerCapture && canvas.setPointerCapture(e.pointerId);
        });
        canvas.addEventListener('pointermove', function (e) {
            if (!G.dragging) return;
            var dx = e.clientX - G.lastX; G.lastX = e.clientX;
            G.moved += Math.abs(dx);
            var k = 0.006; // sezuvchanlik
            G.target -= dx * k;
            G.current -= dx * k * 0.6;
        });
        function up(e) {
            if (!G.dragging) return; G.dragging = false;
            var dt = (performance.now() - G.downT) || 1;
            var totalDx = (e.clientX != null ? e.clientX : G.lastX) - G.downX;
            var totalDy = (e.clientY != null ? e.clientY : G.downY) - G.downY;

            if (G.moved < 8 && Math.abs(totalDy) < 12 && dt < 400) {
                // Tap — qaysi rasm bosildi?
                handleTap(e);
                G.target = Math.round(G.target);
            } else {
                // Inersiya
                G.velocity = -(totalDx / dt) * 0.02;
                G.velocity = Math.max(-0.9, Math.min(0.9, G.velocity));
                if (Math.abs(G.velocity) < 0.02) G.target = Math.round(G.target);
            }
        }
        canvas.addEventListener('pointerup', up);
        canvas.addEventListener('pointercancel', function () { G.dragging = false; G.target = Math.round(G.target); });

        // Wheel (desktop)
        canvas.addEventListener('wheel', function (e) {
            e.preventDefault();
            G.target += (e.deltaY > 0 ? 1 : -1);
        }, { passive: false });

        window.addEventListener('resize', onResize);

        $('prev').onclick = function () { G.target = Math.round(G.target) - 1; };
        $('next').onclick = function () { G.target = Math.round(G.target) + 1; };
        document.addEventListener('keydown', function (e) {
            if ($('viewer').classList.contains('show')) { if (e.key === 'Escape') closeViewer(); return; }
            if (e.key === 'ArrowLeft') G.target = Math.round(G.target) - 1;
            else if (e.key === 'ArrowRight') G.target = Math.round(G.target) + 1;
            else if (e.key === 'Enter') openViewer((((Math.round(G.current) % G.N) + G.N) % G.N));
        });
    }

    function handleTap(e) {
        var rect = $('gl').getBoundingClientRect();
        var mx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        var my = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        G.raycaster.setFromCamera({ x: mx, y: my }, G.camera);
        var meshes = G.photos.map(function (p) { return p.mesh; });
        var hits = G.raycaster.intersectObjects(meshes, false);
        var frontIdx = (((Math.round(G.current) % G.N) + G.N) % G.N);
        if (hits.length) {
            var idx = hits[0].object.userData.index;
            if (idx === frontIdx) openViewer(idx);   // fokusdagini bossa — to'liq ekran
            else G.target = G.current + shortAngle(G.photos[idx].angle - G.current * G.step) / G.step; // yon rasm — markazga
        }
    }

    function onResize() {
        if (!G.renderer) return;
        G.renderer.setSize(window.innerWidth, window.innerHeight);
        G.camera.aspect = window.innerWidth / window.innerHeight;
        G.camera.updateProjectionMatrix();
    }

    // ---------- Fullscreen ko'rish ----------
    var vScale = 1, vTX = 0, vTY = 0, vLastTap = 0, pinch0 = 0, sc0 = 1, vsx = 0, vsy = 0;
    function vApply() { $('vimg').style.transform = 'scale(' + vScale + ') translate(' + vTX + 'px,' + vTY + 'px)'; }
    function openViewer(idx) {
        vScale = 1; vTX = 0; vTY = 0; vApply();
        $('vimg').src = IMG_URLS[idx] || '';
        $('vcap').textContent = (idx + 1) + ' / ' + G.N;
        $('viewer').classList.add('show'); haptic('medium');
    }
    function closeViewer() { $('viewer').classList.remove('show'); }
    function vDist(t) { var dx = t[0].clientX - t[1].clientX, dy = t[0].clientY - t[1].clientY; return Math.hypot(dx, dy); }
    function bindViewer() {
        var v = $('viewer'), img = $('vimg');
        $('vclose').onclick = closeViewer;
        v.addEventListener('click', function (e) { if (e.target === v) closeViewer(); });
        img.addEventListener('click', function () {
            var now = Date.now();
            if (now - vLastTap < 300) { vScale = vScale > 1 ? 1 : 2.3; vTX = 0; vTY = 0; vApply(); }
            vLastTap = now;
        });
        img.addEventListener('touchstart', function (e) { if (e.touches.length === 2) { pinch0 = vDist(e.touches); sc0 = vScale; } }, { passive: true });
        img.addEventListener('touchmove', function (e) {
            if (e.touches.length === 2 && pinch0) { vScale = Math.max(1, Math.min(4, sc0 * (vDist(e.touches) / pinch0))); vApply(); e.preventDefault(); }
        }, { passive: false });
        v.addEventListener('touchstart', function (e) { if (e.touches.length === 1) { vsx = e.touches[0].clientX; vsy = e.touches[0].clientY; } }, { passive: true });
        v.addEventListener('touchend', function (e) {
            if (vScale > 1.05) return;
            var t = e.changedTouches[0], dx = t.clientX - vsx, dy = t.clientY - vsy;
            if (dy > 90 && Math.abs(dy) > Math.abs(dx)) closeViewer();
            else if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
                var cur = (((Math.round(G.current) % G.N) + G.N) % G.N);
                var nx = ((cur + (dx < 0 ? 1 : -1)) % G.N + G.N) % G.N;
                G.target = Math.round(G.current) + (dx < 0 ? 1 : -1);
                openViewer(nx);
            }
        }, { passive: true });
    }

    // ---------- Fallback (WebGL yo'q) ----------
    function startFallback() {
        var f = $('fallback'); f.classList.add('on');
        f.innerHTML = IMG_URLS.map(function (u, i) {
            return '<div class="fc"><img src="' + u + '" alt="rasm ' + (i + 1) + '"></div>';
        }).join('');
        $('gl').style.display = 'none';
        document.querySelector('.hint').textContent = 'Suring';
        hideStatus();
    }

    // ---------- Ishga tushirish ----------
    function start(images) {
        if (!images || !images.length) { showStatus('📭', "Albom hozircha bo'sh. Bot orqali rasm qo'shing."); return; }
        IMG_URLS = images.map(imageUrl);

        if (!hasWebGL() || !window.THREE) { startFallback(); return; }

        initGL();
        layout();
        buildPhotos();
        bindEvents();
        bindViewer();
        updateCount();

        // Ilk kadr chizilgach ekranni ochamiz
        G.running = true;
        requestAnimationFrame(animate);
        setTimeout(function () { hideStatus(); }, 500);

        // count'ni davriy yangilaymiz
        setInterval(updateCount, 120);
    }

    function loadImages() {
        if (!WORKER_URL) { start(DEMO); return; }
        var done = false;
        var to = setTimeout(function () { if (!done) { done = true; start(DEMO); } }, 6000);
        fetch(WORKER_URL.replace(/\/$/, '') + '/list')
            .then(function (r) { return r.json(); })
            .then(function (arr) {
                if (done) return; done = true; clearTimeout(to);
                if (!Array.isArray(arr)) arr = [];
                arr.sort(function (a, b) { return (a.ts || 0) - (b.ts || 0); });
                start(arr.length ? arr : DEMO);
            })
            .catch(function (e) { if (done) return; done = true; clearTimeout(to); console.error(e); start(DEMO); });
    }

    function waitLib(tries) {
        if (window.THREE) { loadImages(); return; }
        if (tries <= 0) {
            // THREE yuklanmadi — rasmlarni baribir ko'rsatamiz (fallback)
            loadImagesNoGL();
            return;
        }
        setTimeout(function () { waitLib(tries - 1); }, 200);
    }
    function loadImagesNoGL() {
        if (!WORKER_URL) { IMG_URLS = DEMO.slice(); startFallback(); return; }
        fetch(WORKER_URL.replace(/\/$/, '') + '/list')
            .then(function (r) { return r.json(); })
            .then(function (arr) {
                if (!Array.isArray(arr)) arr = [];
                arr.sort(function (a, b) { return (a.ts || 0) - (b.ts || 0); });
                var src = arr.length ? arr : DEMO;
                if (!src.length) { showStatus('📭', "Albom bo'sh."); return; }
                IMG_URLS = src.map(imageUrl); startFallback();
            })
            .catch(function () { IMG_URLS = DEMO.slice(); startFallback(); });
    }

    waitLib(30);
    </script>
</body>
</html>
