# =====================================================================
#  📖 Album Bot — Render.com deploy (Firebase kerak emas)
# =====================================================================
services:
  - type: web
    name: album-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: WORKER_URL
        sync: false
      - key: WORKER_SECRET
        sync: false
      - key: MINI_APP_URL
        sync: false
      - key: KEEP_ALIVE_INTERVAL
        value: "240"
