<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avto A1 Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #007bff;
            --luxury-gold: linear-gradient(135deg, rgba(255, 215, 0, 0.8), rgba(218, 165, 32, 0.9));
            --glass-bg: rgba(20, 20, 20, 0.65);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0; color: white;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=1000&q=80');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; padding-bottom: 110px;
        }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }

        /* HEADER & SEARCH */
        .header { text-align: center; padding: 10px 0 20px 0; }
        .header h1 { font-size: 32px; font-weight: 800; margin: 0; display: flex; align-items: center; justify-content: center; gap: 8px; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .verify-icon { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; background: #007bff; border-radius: 50%; }
        .verify-icon svg { width: 14px; height: 14px; fill: white; }
        .header p { font-size: 12px; color: #b3b3b3; margin-top: 5px; font-weight: 500; }
        
        .search-box { width: 100%; box-sizing: border-box; padding: 14px 20px; border-radius: 15px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: white; font-family: 'Montserrat'; font-size: 14px; outline: none; backdrop-filter: blur(10px); margin-bottom: 20px; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .search-box:focus { border-color: var(--primary-blue); box-shadow: 0 5px 20px rgba(0,123,255,0.3); }

        /* KARTALAR */
        .items-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .luxury-card { background: var(--glass-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 18px; padding: 12px; text-align: center; transition: 0.3s; cursor: pointer; box-shadow: 0 8px 25px rgba(0,0,0,0.4); display: flex; flex-direction: column; justify-content: space-between; }
        .luxury-card:active { transform: scale(0.96); border-color: var(--primary-blue); }
        .luxury-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); background-color: #fff; }
        .luxury-card h3 { margin: 5px 0; font-size: 15px; font-weight: 700; color: #fff; }
        .luxury-card h4 { margin: 5px 0; font-size: 13px; font-weight: 700; color: #fff; line-height: 1.3;}
        .luxury-card p { font-size: 11px; color: #aaa; margin: 4px 0; font-weight: 500; }
        .luxury-card .price { color: #00ff88; font-weight: 800; font-size: 13px; margin: 8px 0; }
        .btn-buy { background: linear-gradient(135deg, #007bff, #0056b3); color: white; border: none; width: 100%; padding: 10px; border-radius: 10px; font-weight: 700; font-size: 12px; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4); }

        /* QIDIRUV NATIJALARI */
        .search-list { display: flex; flex-direction: column; gap: 10px; }
        .search-item { display: flex; align-items: center; gap: 15px; background: var(--glass-bg); padding: 10px; border-radius: 15px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); text-align: left; }
        .search-item img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; background-color: #fff; }
        .search-info { flex: 1; }
        .search-info h4 { margin: 0 0 3px 0; font-size: 14px; }
        .search-info .car-brand { font-size: 11px; color: #ffd700; margin: 0 0 3px 0; }
        .search-info .price { color: #00ff88; font-weight: bold; font-size: 13px; margin: 0;}
        .search-item .btn-buy { width: auto; padding: 8px 12px; font-size: 11px; }

        /* AYLANMA TUGMALAR */
        .floating-btn { position: fixed; right: 25px; width: 55px; height: 55px; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; border: 2px solid rgba(255,255,255,0.3); backdrop-filter: blur(10px); transition: 0.3s; }
        .floating-btn:active { transform: scale(0.9); }
        
        #back-btn { bottom: 25px; background: linear-gradient(135deg, #007bff, #0056b3); box-shadow: 0 8px 25px rgba(0, 123, 255, 0.5); }
        #back-btn svg { width: 26px; height: 26px; fill: white; margin-right: 3px; }

        #cart-btn { bottom: 95px; background: var(--luxury-gold); box-shadow: 0 8px 25px rgba(218, 165, 32, 0.6); border-color: rgba(255,215,0,0.5); }
        #cart-btn svg { width: 24px; height: 24px; fill: white; }
        .cart-badge { position: absolute; top: -2px; right: -2px; background: red; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        .shake-animation { animation: shakeCart 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeCart { 10%, 90% { transform: translate3d(-1px, 0, 0) scale(1.1); } 20%, 80% { transform: translate3d(2px, 0, 0) scale(1.1); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0) scale(1.1) rotate(-10deg); } 40%, 60% { transform: translate3d(4px, 0, 0) scale(1.1) rotate(10deg); } }

        /* SAVATCHA OYNASI */
        .cart-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 2000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; margin-bottom: 15px; }
        .cart-header h2 { margin: 0; font-size: 20px; color: #ffd700; }
        .close-cart { background: transparent; border: none; color: white; font-size: 28px; cursor: pointer; }
        
        .cart-items { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .cart-row { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; }
        .cart-row-info h4 { margin: 0; font-size: 13px; }
        .cart-row-info p { margin: 3px 0 0; color: #00ff88; font-size: 12px; font-weight: bold; }
        .cart-controls { display: flex; align-items: center; gap: 10px; }
        .cart-controls button { background: #333; border: none; color: white; width: 28px; height: 28px; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .cart-controls span { font-size: 14px; font-weight: bold; width: 20px; text-align: center; }

        .cart-footer { padding-top: 15px; border-top: 1px solid var(--glass-border); margin-top: 10px; }
        .cart-total-line { display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .cart-total-line span:last-child { color: #00ff88; }
        .btn-checkout { background: var(--luxury-gold); color: #000; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 5px 20px rgba(218, 165, 32, 0.4); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>AvtoA1 
            <span class="verify-icon"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>
        </h1>
        <p>ROSSIYA 🇷🇺 VA XITOY 🇨🇳 PREMIUM ZAPCHASTLARI</p>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Zapchast nomini qidiring..." onkeyup="searchProducts()">

    <div id="content-area">
        
        <div id="main-menu" class="items-grid">
            <div class="luxury-card" onclick="showSection('gazel-types')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/25/GAZ-3302_in_Moscow.jpg/640px-GAZ-3302_in_Moscow.jpg" alt="Gazel">
                <h3>Gazel 🚛</h3>
            </div>
            <div class="luxury-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/GAZ-31105_Volga.jpg/640px-GAZ-31105_Volga.jpg" alt="Volga">
                <h3>Volga 🏎️</h3>
            </div>
            <div class="luxury-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/69/UAZ-Hunter_2010.jpg/640px-UAZ-Hunter_2010.jpg" alt="UAZ">
                <h3>UAZ 🚙</h3>
            </div>
        </div>

        <div id="gazel-types" class="items-grid hidden">
            <div class="luxury-card" onclick="showSection('gazel-biznes-sections')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/25/GAZ-3302_in_Moscow.jpg/640px-GAZ-3302_in_Moscow.jpg" alt="Biznes">
                <h3>Gazel Biznes</h3>
            </div>
            <div class="luxury-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/GAZelle_NEXT_A21R22-03.jpg/640px-GAZelle_NEXT_A21R22-03.jpg" alt="Next">
                <h3>Gazel Next</h3>
            </div>
        </div>

        <div id="gazel-biznes-sections" class="items-grid hidden">
            <div class="luxury-card" onclick="showSection('biznes-motor')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Engine_zmz-405.jpg/640px-Engine_zmz-405.jpg" alt="Motor">
                <h3>⚙️ Motor Qismlari</h3>
            </div>
            <div class="luxury-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/50/Car_suspension_part.jpg/640px-Car_suspension_part.jpg" alt="Xadavoy">
                <h3>🛠️ Xadavoy</h3>
            </div>
        </div>

        <div id="biznes-motor" class="items-grid hidden"></div>
    </div>

    <div id="search-results" class="search-list hidden"></div>

</div>

<div class="floating-btn" id="cart-btn" onclick="openCart()">
    <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
    <div class="cart-badge" id="cart-badge">0</div>
</div>

<div class="floating-btn" onclick="goBack()" id="back-btn">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
</div>

<div class="cart-modal" id="cartModal">
    <div class="cart-header">
        <h2>🛒 Savatcha</h2>
        <button class="close-cart" onclick="closeCart()">×</button>
    </div>
    <div class="cart-items" id="cart-items-container">
        </div>
    <div class="cart-footer">
        <div class="cart-total-line">
            <span>Jami summa:</span>
            <span id="cart-total-sum">0 so'm</span>
        </div>
        <button class="btn-checkout">💳 Xaridni rasmiylashtirish</button>
    </div>
</div>

<script>
    // Agar Mini App ichida ochilsa ekranni to'liq yoyish uchun:
    if(window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.expand();
    }

    // --- MA'LUMOTLAR BAZASI ---
    const productsDB = [
        { id: 1, name: "Porshen To'plami 📦", car: "Gazel Biznes", brand: "🇷🇺 Rossiya (Original)", price: 1060000, img: "https://i.postimg.cc/zDhCzyyB/gazel.jpg", category: "biznes-motor" },
        { id: 2, name: "Gidrokompensator ✨", car: "Gazel Biznes", brand: "🇨🇳 Xitoy (Premium)", price: 20000, img: "https://i.postimg.cc/FRVhpbPs/gizrokompesator.jpg", category: "biznes-motor" }
    ];

    let cart = {}; 
    let historyStack = ['main-menu'];

    function renderProducts() {
        const motorDiv = document.getElementById('biznes-motor');
        motorDiv.innerHTML = '';
        productsDB.filter(p => p.category === 'biznes-motor').forEach(p => {
            motorDiv.innerHTML += `
                <div class="luxury-card">
                    <img src="${p.img}">
                    <h4>${p.name}</h4>
                    <p>${p.brand}</p>
                    <div class="price">${p.price.toLocaleString('uz-UZ')} so'm</div>
                    <button class="btn-buy" onclick="addToCart(${p.id})">🛒 Savatga</button>
                </div>
            `;
        });
    }
    renderProducts();

    // --- NAVIGATSIYA VA TUGMALAR ---
    function showSection(id) {
        document.getElementById('searchInput').value = '';
        document.getElementById('search-results').classList.add('hidden');
        document.getElementById('content-area').classList.remove('hidden');

        document.querySelectorAll('#content-area > div').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        historyStack.push(id);
        updateButtonsVisibility();
    }

    function goBack() {
        if (historyStack.length > 1) {
            historyStack.pop();
            let previousId = historyStack[historyStack.length - 1];
            document.querySelectorAll('#content-area > div').forEach(el => el.classList.add('hidden'));
            document.getElementById(previousId).classList.remove('hidden');
            
            document.getElementById('searchInput').value = '';
            document.getElementById('search-results').classList.add('hidden');
            document.getElementById('content-area').classList.remove('hidden');
            
            updateButtonsVisibility();
        }
    }

    function updateButtonsVisibility() {
        document.getElementById('back-btn').style.display = historyStack.length > 1 ? 'flex' : 'none';
        
        let inDeepSection = ['biznes-motor'].includes(historyStack[historyStack.length - 1]);
        let hasItems = Object.keys(cart).length > 0;
        
        document.getElementById('cart-btn').style.display = (inDeepSection || hasItems) ? 'flex' : 'none';
    }

    // --- QIDIRUV TIZIMI ---
    function searchProducts() {
        let query = document.getElementById('searchInput').value.toLowerCase();
        let resultsDiv = document.getElementById('search-results');
        let contentArea = document.getElementById('content-area');

        if (query.length > 0) {
            contentArea.classList.add('hidden');
            resultsDiv.classList.remove('hidden');
            
            let filtered = productsDB.filter(p => p.name.toLowerCase().includes(query) || p.car.toLowerCase().includes(query));
            
            resultsDiv.innerHTML = '';
            if(filtered.length === 0) {
                resultsDiv.innerHTML = '<p style="text-align:center; color:#888;">Hech narsa topilmadi...</p>';
                return;
            }

            filtered.forEach(p => {
                resultsDiv.innerHTML += `
                    <div class="search-item">
                        <img src="${p.img}">
                        <div class="search-info">
                            <h4>${p.name}</h4>
                            <p class="car-brand">Mashina: ${p.car} <br> ${p.brand}</p>
                            <p class="price">${p.price.toLocaleString('uz-UZ')} so'm</p>
                        </div>
                        <button class="btn-buy" onclick="addToCart(${p.id})">🛒 Qo'shish</button>
                    </div>
                `;
            });
            document.getElementById('cart-btn').style.display = 'flex'; 
        } else {
            resultsDiv.classList.add('hidden');
            contentArea.classList.remove('hidden');
            updateButtonsVisibility();
        }
    }

    // --- SAVATCHA TIZIMI ---
    function addToCart(id) {
        if (cart[id]) { cart[id]++; } else { cart[id] = 1; }
        
        const cartBtn = document.getElementById('cart-btn');
        cartBtn.style.display = 'flex';
        cartBtn.classList.remove('shake-animation');
        void cartBtn.offsetWidth;
        cartBtn.classList.add('shake-animation');
        
        updateCartBadge();
    }

    function changeQty(id, delta) {
        if (cart[id]) {
            cart[id] += delta;
            if (cart[id] <= 0) delete cart[id];
            updateCartBadge();
            renderCartItems();
            updateButtonsVisibility();
        }
    }

    function updateCartBadge() {
        let totalItems = Object.values(cart).reduce((a, b) => a + b, 0);
        document.getElementById('cart-badge').innerText = totalItems;
    }

    function openCart() {
        renderCartItems();
        document.getElementById('cartModal').style.display = 'flex';
    }

    function closeCart() {
        document.getElementById('cartModal').style.display = 'none';
    }

    function renderCartItems() {
        let container = document.getElementById('cart-items-container');
        container.innerHTML = '';
        let totalSum = 0;

        if (Object.keys(cart).length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#888; margin-top:50px;">Savatcha bo\'sh</p>';
        } else {
            for (let id in cart) {
                let product = productsDB.find(p => p.id == id);
                let qty = cart[id];
                totalSum += product.price * qty;

                container.innerHTML += `
                    <div class="cart-row">
                        <div class="cart-row-info">
                            <h4>${product.name}</h4>
                            <p>${(product.price * qty).toLocaleString('uz-UZ')} so'm</p>
                        </div>
                        <div class="cart-controls">
                            <button onclick="changeQty(${id}, -1)">-</button>
                            <span>${qty}</span>
                            <button onclick="changeQty(${id}, 1)">+</button>
                        </div>
                    </div>
                `;
            }
        }
        document.getElementById('cart-total-sum').innerText = totalSum.toLocaleString('uz-UZ') + " so'm";
    }
</script>

</body>
</html>
