<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avto A1 Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #007bff;
            --luxury-gold: linear-gradient(135deg, rgba(255, 215, 0, 0.8), rgba(218, 165, 32, 0.9));
            --glass-bg: rgba(20, 20, 20, 0.75);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0; color: white;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=1000&q=80');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; padding-bottom: 110px;
        }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }

        /* HEADER & SEARCH */
        .header { text-align: center; padding: 10px 0 20px 0; }
        .header h1 { font-size: 32px; font-weight: 800; margin: 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .verify-icon { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; background: #007bff; border-radius: 50%; }
        .verify-icon svg { width: 14px; height: 14px; fill: white; }
        .header p { font-size: 11px; color: #ffd700; margin-top: 5px; font-weight: 700; letter-spacing: 1px; }
        
        .search-box { width: 100%; box-sizing: border-box; padding: 14px 20px; border-radius: 15px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: white; font-family: 'Montserrat'; font-size: 14px; outline: none; backdrop-filter: blur(10px); margin-bottom: 20px; transition: 0.3s; }

        /* KARTALAR */
        .items-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .luxury-card { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 18px; padding: 12px; text-align: center; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; }
        .luxury-card:active { transform: scale(0.96); }
        .luxury-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; margin-bottom: 10px; }
        .luxury-card h3 { margin: 5px 0; font-size: 15px; font-weight: 700; }
        .luxury-card h4 { margin: 5px 0; font-size: 13px; font-weight: 700; line-height: 1.3; }
        .luxury-card .price { color: #00ff88; font-weight: 800; font-size: 13px; margin: 8px 0; }
        .btn-buy { background: linear-gradient(135deg, #007bff, #0056b3); color: white; border: none; width: 100%; padding: 10px; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* QIDIRUV */
        .search-list { display: flex; flex-direction: column; gap: 10px; }
        .search-item { display: flex; align-items: center; gap: 15px; background: var(--glass-bg); padding: 10px; border-radius: 15px; border: 1px solid var(--glass-border); }
        .search-item img { width: 70px; height: 70px; border-radius: 10px; }
        .search-info { flex: 1; }
        .search-info h4 { margin: 0; font-size: 14px; }
        .search-info .price { color: #00ff88; font-weight: bold; }

        /* FLOATING BUTTONS */
        .floating-btn { position: fixed; right: 25px; width: 55px; height: 55px; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; transition: 0.3s; }
        #back-btn { bottom: 25px; background: #007bff; box-shadow: 0 5px 15px rgba(0,123,255,0.4); }
        #cart-btn { bottom: 95px; background: var(--luxury-gold); box-shadow: 0 5px 15px rgba(218,165,32,0.4); }
        .cart-badge { position: absolute; top: -2px; right: -2px; background: red; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        /* SAVATCHA MODAL */
        .cart-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 2000; display: none; flex-direction: column; padding: 20px; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .cart-items { flex: 1; overflow-y: auto; margin-top: 15px; }
        .cart-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; margin-bottom: 10px; }
        .btn-checkout { background: var(--luxury-gold); color: #000; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>AvtoA1 <span class="verify-icon"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span></h1>
        <p>ROSSIYA 🇷🇺 VA XITOY 🇨🇳 PREMIUM ZAPCHASTLARI</p>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Zapchast qidirish..." onkeyup="searchProducts()">

    <div id="content-area">
        <div id="main-menu" class="items-grid">
            <div class="luxury-card" onclick="showSection('gazel-types')">
                <img src="https://i.postimg.cc/zDhCzyyB/gazel.jpg"><h3>Gazel 🚛</h3>
            </div>
            <div class="luxury-card"><img src="https://i.postimg.cc/zDhCzyyB/gazel.jpg"><h3>Volga 🏎️</h3></div>
            <div class="luxury-card"><img src="https://i.postimg.cc/zDhCzyyB/gazel.jpg"><h3>Sobol 🚐</h3></div>
        </div>

        <div id="gazel-types" class="items-grid hidden">
            <div class="luxury-card" onclick="showSection('gazel-biznes-sections')">
                <img src="https://i.postimg.cc/zDhCzyyB/gazel.jpg"><h3>Gazel Biznes</h3>
            </div>
            <div class="luxury-card"><img src="https://i.postimg.cc/zDhCzyyB/gazel.jpg"><h3>Gazel Next</h3></div>
        </div>

        <div id="gazel-biznes-sections" class="items-grid hidden">
            <div class="luxury-card" onclick="showSection('biznes-motor')">
                <img src="https://i.postimg.cc/zDhCzyyB/gazel.jpg"><h3>⚙️ Motor Qismlari</h3>
            </div>
            <div class="luxury-card"><img src="https://i.postimg.cc/zDhCzyyB/gazel.jpg"><h3>🛠️ Xadavoy</h3></div>
        </div>

        <div id="biznes-motor" class="items-grid hidden"></div>
    </div>

    <div id="search-results" class="search-list hidden"></div>
</div>

<div class="floating-btn" id="cart-btn" onclick="openCart()">
    <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
    <div class="cart-badge" id="cart-badge">0</div>
</div>

<div class="floating-btn" id="back-btn" onclick="goBack()">
    <svg width="28" height="28" fill="white" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
</div>

<div class="cart-modal" id="cartModal">
    <div class="cart-header">
        <h2>🛒 Savatcha</h2>
        <button onclick="closeCart()" style="background:none; border:none; color:white; font-size:30px;">×</button>
    </div>
    <div class="cart-items" id="cart-items-container"></div>
    <div style="padding: 20px 0;">
        <div style="display:flex; justify-content:space-between; font-size:20px; font-weight:800; margin-bottom:15px;">
            <span>Jami:</span> <span id="cart-total-sum" style="color:#00ff88">0 so'm</span>
        </div>
        <button class="btn-checkout" onclick="finalizeOrder()">💳 Xaridni rasmiylashtirish</button>
    </div>
</div>

<script>
    const productsDB = [
        { id: 1, name: "Porshen To'plami 📦", car: "Gazel Biznes", brand: "🇷🇺 Rossiya", price: 1060000, img: "https://i.postimg.cc/zDhCzyyB/gazel.jpg", category: "biznes-motor" },
        { id: 2, name: "Gidrokompensator ✨", car: "Gazel Biznes", brand: "🇨🇳 Xitoy", price: 20000, img: "https://i.postimg.cc/FRVhpbPs/gizrokompesator.jpg", category: "biznes-motor" }
    ];

    let cart = {}; 
    let historyStack = ['main-menu'];

    function renderProducts() {
        const motorDiv = document.getElementById('biznes-motor');
        motorDiv.innerHTML = '';
        productsDB.filter(p => p.category === 'biznes-motor').forEach(p => {
            motorDiv.innerHTML += `
                <div class="luxury-card">
                    <img src="${p.img}">
                    <h4>${p.name}</h4>
                    <div class="price">${p.price.toLocaleString('uz-UZ')} so'm</div>
                    <button class="btn-buy" onclick="addToCart(${p.id})">🛒 Savatga</button>
                </div>`;
        });
    }
    renderProducts();

    function showSection(id) {
        document.querySelectorAll('#content-area > div').forEach(el => el.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        historyStack.push(id);
        updateButtons();
    }

    function goBack() {
        if (historyStack.length > 1) {
            document.getElementById(historyStack.pop()).classList.add('hidden');
            document.getElementById(historyStack[historyStack.length-1]).classList.remove('hidden');
            updateButtons();
        }
    }

    function updateButtons() {
        document.getElementById('back-btn').style.display = historyStack.length > 1 ? 'flex' : 'none';
        document.getElementById('cart-btn').style.display = Object.keys(cart).length > 0 ? 'flex' : 'none';
    }

    function searchProducts() {
        let q = document.getElementById('searchInput').value.toLowerCase();
        let res = document.getElementById('search-results');
        if (q.length > 0) {
            document.getElementById('content-area').classList.add('hidden');
            res.classList.remove('hidden');
            let filtered = productsDB.filter(p => p.name.toLowerCase().includes(q));
            res.innerHTML = filtered.length ? '' : '<p>Hech narsa topilmadi</p>';
            filtered.forEach(p => {
                res.innerHTML += `<div class="search-item"><img src="${p.img}"><div class="search-info"><h4>${p.name}</h4><p class="price">${p.price.toLocaleString()} so'm</p></div><button class="btn-buy" style="width:auto" onclick="addToCart(${p.id})">+</button></div>`;
            });
        } else {
            res.classList.add('hidden');
            document.getElementById('content-area').classList.remove('hidden');
        }
    }

    function addToCart(id) {
        cart[id] = (cart[id] || 0) + 1;
        updateCartBadge();
        updateButtons();
    }

    function updateCartBadge() {
        let total = Object.values(cart).reduce((a, b) => a + b, 0);
        document.getElementById('cart-badge').innerText = total;
    }

    function openCart() {
        let container = document.getElementById('cart-items-container');
        container.innerHTML = '';
        let total = 0;
        for (let id in cart) {
            let p = productsDB.find(x => x.id == id);
            total += p.price * cart[id];
            container.innerHTML += `<div class="cart-row"><div><b>${p.name}</b><br>${cart[id]} dona</div><div>${(p.price * cart[id]).toLocaleString()} so'm</div></div>`;
        }
        document.getElementById('cart-total-sum').innerText = total.toLocaleString() + " so'm";
        document.getElementById('cartModal').style.display = 'flex';
    }

    function closeCart() { document.getElementById('cartModal').style.display = 'none'; }

    // --- INTEGRATSIYA: MIJOZ MA'LUMOTLARINI OLISH ---
    function finalizeOrder() {
        let name = prompt("Ismingizni kiriting:");
        let phone = prompt("Telefon raqamingiz:");
        let address = prompt("Manzilingiz (Samarqand):");

        if (name && phone && address) {
            let items = "";
            for (let id in cart) {
                let p = productsDB.find(x => x.id == id);
                items += `${p.name} (${cart[id]} dona), `;
            }
            let text = `📦 YANGI BUYURTMA:\n👤 Mijoz: ${name}\n📞 Tel: ${phone}\n📍 Manzil: ${address}\n🛒 Mahsulotlar: ${items}\n💰 Jami: ${document.getElementById('cart-total-sum').innerText}`;
            
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.sendData(text);
            } else {
                alert("Rahmat! Buyurtmangiz qabul qilindi:\n\n" + text);
            }
        } else {
            alert("Iltimos, barcha ma'lumotlarni to'ldiring!");
        }
    }
</script>
</body>
</html>
