<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avto A1 - Samarkand</title>
    <style>
        /* Asosiy dizayn */
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; padding: 10px; border-bottom: 2px solid #007bff; margin-bottom: 20px; }
        
        /* Menyu tugmalari */
        .btn-menu { background: #2c2c2c; border: 1px solid #444; color: white; padding: 15px; margin-bottom: 10px; 
                    width: 100%; border-radius: 12px; font-size: 16px; text-align: left; cursor: pointer; display: flex; justify-content: space-between; }
        .btn-back { background: #dc3545; color: white; padding: 10px; border: none; border-radius: 8px; margin-bottom: 15px; cursor: pointer; width: 100%; font-weight: bold;}
        .hidden { display: none; }
        
        /* Mahsulotlar setkasi (Skrinshotingizdagidek) */
        .items-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        
        .item-card {
            background: #1e1e1e; border-radius: 12px; padding: 10px; text-align: center;
            border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between;
        }
        
        .item-card img {
            width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 8px; margin-bottom: 8px;
        }
        
        .item-card h4 { margin: 5px 0; font-size: 13px; height: 32px; overflow: hidden; color: #fff; }
        .item-card p { font-size: 11px; color: #888; margin: 2px 0; }
        .item-card .price { color: #00ff00; font-weight: bold; font-size: 13px; margin: 5px 0; }
        .btn-buy { width: 100%; padding: 8px; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 11px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Avto A1 Katalog</h2>
            <p style="font-size: 12px; color: #888;">Sifatli ehtiyot qismlar do'koni</p>
        </div>

        <div id="cars-menu">
            <button class="btn-menu" onclick="showSubMenu('gazel-sections')">Gazel <span>&rsaquo;</span></button>
            <button class="btn-menu" onclick="showSubMenu('volga-sections')">Volga <span>&rsaquo;</span></button>
            <button class="btn-menu" onclick="showSubMenu('sobel-sections')">Sobel <span>&rsaquo;</span></button>
        </div>

        <div id="gazel-sections" class="hidden">
            <button class="btn-back" onclick="backToCars()">← Orqaga</button>
            <h3 style="text-align:center; font-size: 16px;">Gazel bo'limlari</h3>
            <button class="btn-menu" onclick="showItems('gazel-motor')">Motor zapchastlari <span>&rsaquo;</span></button>
            <button class="btn-menu" onclick="showItems('gazel-xadavoy')">Xadavoy zapchastlari <span>&rsaquo;</span></button>
            <button class="btn-menu" onclick="showItems('gazel-kuzov')">Kuzov zapchastlari <span>&rsaquo;</span></button>
            <button class="btn-menu" onclick="showItems('gazel-salon')">Salon zapchastlari <span>&rsaquo;</span></button>
        </div>

        <div id="gazel-motor" class="hidden">
            <button class="btn-back" onclick="showSubMenu('gazel-sections')">← Orqaga</button>
            <div class="items-grid">
                
                <div class="item-card">
                    <img src="https://i.postimg.cc/zDhCzyyB/gazel.jpg" alt="Porshen">
                    <h4>Porshen to'plami</h4>
                    <p>Rossiya zavod</p>
                    <div class="price">1,060,000 so'm</div>
                    <button class="btn-buy">Savatga</button>
                </div>

                <div class="item-card">
                    <img src="https://i.postimg.cc/FRVhpbPs/gizrokompesator.jpg" alt="Gidro">
                    <h4>Gidrokompensator</h4>
                    <p>Gazel 406 mator</p>
                    <div class="price">20,000 so'm</div>
                    <button class="btn-buy">Savatga</button>
                </div>

            </div>
        </div>

        <div id="gazel-xadavoy" class="hidden">
            <button class="btn-back" onclick="showSubMenu('gazel-sections')">← Orqaga</button>
            <p style="text-align:center; color:#888;">Xozircha bu bo'lim bo'sh...</p>
        </div>
        
        <div id="volga-sections" class="hidden">
            <button class="btn-back" onclick="backToCars()">← Orqaga</button>
            <p style="text-align:center; color:#888;">Volga bo'limi tez kunda...</p>
        </div>

        <div id="sobel-sections" class="hidden">
            <button class="btn-back" onclick="backToCars()">← Orqaga</button>
            <p style="text-align:center; color:#888;">Sobel bo'limi tez kunda...</p>
        </div>

    </div>

    <script>
        // Bo'limlarni almashtirish funksiyalari
        function showSubMenu(id) {
            document.querySelectorAll('.container > div:not(.header)').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        function showItems(id) {
            document.querySelectorAll('.container > div:not(.header)').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        function backToCars() {
            document.querySelectorAll('.container > div:not(.header)').forEach(el => el.classList.add('hidden'));
            document.getElementById('cars-menu').classList.remove('hidden');
        }
    </script>
</body>
</html>
