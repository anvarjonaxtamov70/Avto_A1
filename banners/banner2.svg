<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1618 1000" width="1618" height="1000" font-family="Montserrat, Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0D060"/>
      <stop offset="0.45" stop-color="#C9A84C"/>
      <stop offset="1" stop-color="#96720A"/>
    </linearGradient>
    <radialGradient id="burst2" cx="0.72" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#C9A84C" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1618" height="1000" fill="url(#bg2)"/>
  <rect width="1618" height="1000" fill="url(#burst2)"/>

  <!-- Nurli starburst -->
  <g transform="translate(1180 500)" stroke="url(#gold2)" stroke-opacity="0.25" stroke-width="6">
    <line x1="-420" y1="0" x2="420" y2="0"/>
    <line x1="0" y1="-420" x2="0" y2="420"/>
    <line x1="-300" y1="-300" x2="300" y2="300"/>
    <line x1="-300" y1="300" x2="300" y2="-300"/>
    <line x1="-150" y1="-390" x2="150" y2="390"/>
    <line x1="-390" y1="-150" x2="390" y2="150"/>
    <line x1="-390" y1="150" x2="390" y2="-150"/>
    <line x1="-150" y1="390" x2="150" y2="-390"/>
  </g>

  <text x="120" y="300" fill="#8e8e93" font-size="44" font-weight="600" letter-spacing="10">MAVSUMIY AKSIYA</text>

  <!-- Katta chegirma -->
  <text x="112" y="640" fill="url(#gold2)" font-size="320" font-weight="800">-20%</text>

  <text x="120" y="760" fill="#ffffff" font-size="60" font-weight="700">Porshen, val, salnik va boshqalar</text>
  <text x="120" y="840" fill="#8e8e93" font-size="40" font-weight="500">Faqat shu hafta — omborda qolgan tovarlar bilan</text>

  <!-- O'ng tomonda badge -->
  <g transform="translate(1180 500)">
    <circle r="190" fill="url(#gold2)"/>
    <circle r="190" fill="none" stroke="#121212" stroke-opacity="0.25" stroke-width="6"/>
    <text x="0" y="-20" fill="#121212" font-size="62" font-weight="800" text-anchor="middle">CHEGIRMA</text>
    <text x="0" y="80" fill="#121212" font-size="110" font-weight="800" text-anchor="middle">SALE</text>
  </g>
</svg>
