<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1618 1000" width="1618" height="1000" font-family="Montserrat, 'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="b2bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#181820"/>
      <stop offset="0.55" stop-color="#101015"/>
      <stop offset="1" stop-color="#0a0a0d"/>
    </linearGradient>
    <radialGradient id="b2glow" cx="0.8" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#C9A84C" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="b2gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4D873"/>
      <stop offset="0.5" stop-color="#C9A84C"/>
      <stop offset="1" stop-color="#9A7611"/>
    </linearGradient>
  </defs>

  <rect width="1618" height="1000" fill="url(#b2bg)"/>
  <rect width="1618" height="1000" fill="url(#b2glow)"/>
  <circle cx="1290" cy="430" r="300" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="2"/>

  <!-- ===== Qalqon (shield) ===== -->
  <g transform="translate(1290 430)">
    <path d="M0 -200 L168 -132 V28 C168 124 92 196 0 224 C-92 196 -168 124 -168 28 V-132 Z" fill="url(#b2gold)"/>
    <path d="M0 -200 L168 -132 V28 C168 124 92 196 0 224 C-92 196 -168 124 -168 28 V-132 Z" fill="#0c0c0e" fill-opacity="0" stroke="#ffffff" stroke-opacity="0.3" stroke-width="3"/>
    <path d="M0 -168 L138 -110 V26 C138 104 76 166 0 190 C-76 166 -138 104 -138 26 V-110 Z" fill="#101015"/>
    <polyline points="-66,8 -16,62 78,-66" fill="none" stroke="url(#b2gold)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ===== Sarlavha bloki ===== -->
  <text x="110" y="180" fill="#C9A84C" font-size="30" font-weight="700" letter-spacing="5">AVTO A1 &#8212; KAFOLAT XIZMATI</text>

  <text x="106" y="318" fill="url(#b2gold)" font-size="124" font-weight="800" letter-spacing="1">14 KUN</text>
  <text x="110" y="438" fill="#ffffff" font-size="124" font-weight="800" letter-spacing="1">KAFOLAT</text>

  <text x="110" y="508" fill="#cdcdd3" font-size="37" font-weight="500">Har bir tovar sotuvdan oldin tekshiruvdan o&#8216;tadi.</text>

  <!-- ===== Kafolat punktlari ===== -->
  <g transform="translate(110 560)">
    <!-- 1 -->
    <g>
      <rect width="900" height="88" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.5"/>
      <circle cx="60" cy="44" r="26" fill="#C9A84C" fill-opacity="0.16"/>
      <polyline points="48,45 57,54 73,34" fill="none" stroke="#F4D873" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="112" y="55" fill="#ececef" font-size="33" font-weight="600">100% haqiqiy (original) tovar &#8212; kafolatlangan</text>
    </g>
    <!-- 2 -->
    <g transform="translate(0 108)">
      <rect width="900" height="88" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.5"/>
      <circle cx="60" cy="44" r="26" fill="#C9A84C" fill-opacity="0.16"/>
      <polyline points="48,45 57,54 73,34" fill="none" stroke="#F4D873" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="112" y="55" fill="#ececef" font-size="33" font-weight="600">Zavod nuqsoni bo&#8216;lsa &#8212; bepul almashtiriladi</text>
    </g>
    <!-- 3 -->
    <g transform="translate(0 216)">
      <rect width="900" height="88" rx="20" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.5"/>
      <circle cx="60" cy="44" r="26" fill="#C9A84C" fill-opacity="0.16"/>
      <polyline points="48,45 57,54 73,34" fill="none" stroke="#F4D873" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="112" y="55" fill="#ececef" font-size="33" font-weight="600">7 kun ichida pulni to&#8216;liq qaytarish imkoni</text>
    </g>
  </g>
</svg>
