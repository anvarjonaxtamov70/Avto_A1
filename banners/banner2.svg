<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1618 1000" width="1618" height="1000" font-family="Montserrat, Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="b2bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#202024"/>
      <stop offset="0.5" stop-color="#141417"/>
      <stop offset="1" stop-color="#0b0b0d"/>
    </linearGradient>
    <radialGradient id="b2vig" cx="0.74" cy="0.5" r="0.62">
      <stop offset="0" stop-color="#3a3a40" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3a3a40" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b2metal" cx="0.4" cy="0.34" r="0.85">
      <stop offset="0" stop-color="#ececef"/>
      <stop offset="0.32" stop-color="#c2c2c8"/>
      <stop offset="0.66" stop-color="#86868d"/>
      <stop offset="1" stop-color="#46464c"/>
    </radialGradient>
    <radialGradient id="b2hat" cx="0.42" cy="0.36" r="0.9">
      <stop offset="0" stop-color="#d2d2d8"/>
      <stop offset="0.55" stop-color="#9a9aa1"/>
      <stop offset="1" stop-color="#54545a"/>
    </radialGradient>
    <radialGradient id="b2bore" cx="0.4" cy="0.35" r="0.9">
      <stop offset="0" stop-color="#2a2a2e"/>
      <stop offset="1" stop-color="#08080a"/>
    </radialGradient>
    <linearGradient id="b2gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0D060"/>
      <stop offset="0.5" stop-color="#C9A84C"/>
      <stop offset="1" stop-color="#96720A"/>
    </linearGradient>
  </defs>

  <rect width="1618" height="1000" fill="url(#b2bg)"/>
  <rect width="1618" height="1000" fill="url(#b2vig)"/>

  <!-- ===== Tormoz diski (realistik) ===== -->
  <g transform="translate(1180 502)">
    <!-- yumshoq soya -->
    <ellipse cx="26" cy="372" rx="312" ry="46" fill="#000000" opacity="0.45"/>

    <!-- tashqi qirra -->
    <circle r="350" fill="#34343a"/>
    <circle r="344" fill="url(#b2metal)"/>
    <!-- ingichka gold aksent halqa (brend) -->
    <circle r="338" fill="none" stroke="url(#b2gold)" stroke-width="3" stroke-opacity="0.85"/>

    <!-- ishlangan (machined) konsentrik chiziqlar -->
    <g fill="none" stroke="#ffffff" stroke-opacity="0.10">
      <circle r="312"/><circle r="296"/><circle r="280"/>
      <circle r="196"/><circle r="180"/>
    </g>
    <g fill="none" stroke="#000000" stroke-opacity="0.16">
      <circle r="304"/><circle r="288"/><circle r="188"/>
    </g>

    <!-- aylanma slotlar (slotted rotor) -->
    <g stroke="#16161a" stroke-width="9" stroke-linecap="round" fill="none">
      <g transform="rotate(0)"><path d="M -48.9 -229.9 A 235 235 0 0 1 48.9 -229.9"/></g>
      <g transform="rotate(60)"><path d="M -48.9 -229.9 A 235 235 0 0 1 48.9 -229.9"/></g>
      <g transform="rotate(120)"><path d="M -48.9 -229.9 A 235 235 0 0 1 48.9 -229.9"/></g>
      <g transform="rotate(180)"><path d="M -48.9 -229.9 A 235 235 0 0 1 48.9 -229.9"/></g>
      <g transform="rotate(240)"><path d="M -48.9 -229.9 A 235 235 0 0 1 48.9 -229.9"/></g>
      <g transform="rotate(300)"><path d="M -48.9 -229.9 A 235 235 0 0 1 48.9 -229.9"/></g>
    </g>

    <!-- teshiklar (cross-drilled) -->
    <g fill="#141418" stroke="#5e5e66" stroke-width="1.5" stroke-opacity="0.7">
      <circle cx="0" cy="-262" r="13"/>
      <circle cx="131" cy="-226.9" r="13"/>
      <circle cx="226.9" cy="-131" r="13"/>
      <circle cx="262" cy="0" r="13"/>
      <circle cx="226.9" cy="131" r="13"/>
      <circle cx="131" cy="226.9" r="13"/>
      <circle cx="0" cy="262" r="13"/>
      <circle cx="-131" cy="226.9" r="13"/>
      <circle cx="-226.9" cy="131" r="13"/>
      <circle cx="-262" cy="0" r="13"/>
      <circle cx="-226.9" cy="-131" r="13"/>
      <circle cx="-131" cy="-226.9" r="13"/>
    </g>

    <!-- markaziy stupitsa (hat) -->
    <circle r="166" fill="#26262a"/>
    <circle r="150" fill="url(#b2hat)"/>
    <circle r="150" fill="none" stroke="#000000" stroke-opacity="0.25" stroke-width="2"/>

    <!-- bolt teshiklari -->
    <g fill="url(#b2bore)" stroke="#000000" stroke-opacity="0.4" stroke-width="1.5">
      <circle cx="0" cy="-92" r="16"/>
      <circle cx="87.5" cy="-28.4" r="16"/>
      <circle cx="54.1" cy="74.4" r="16"/>
      <circle cx="-54.1" cy="74.4" r="16"/>
      <circle cx="-87.5" cy="-28.4" r="16"/>
    </g>

    <!-- markaziy tешik -->
    <circle r="46" fill="url(#b2bore)"/>
    <circle r="46" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
  </g>

  <!-- ===== Matn bloki ===== -->
  <text x="120" y="312" fill="#C9A84C" font-size="34" font-weight="700" letter-spacing="6">AVTO A1 &#8212; TORMOZ TIZIMI</text>

  <text x="116" y="452" fill="#ffffff" font-size="120" font-weight="800" letter-spacing="1">TORMOZ</text>
  <text x="116" y="572" fill="#ffffff" font-size="120" font-weight="800" letter-spacing="1">DISKLARI</text>

  <rect x="120" y="612" width="150" height="5" rx="2.5" fill="url(#b2gold)"/>

  <text x="120" y="690" fill="#c7c7cc" font-size="42" font-weight="500">Yevropa sifati &#8212; har bir detal sinovdan o&#8216;tgan.</text>

  <!-- xususiyatlar qatori -->
  <g font-size="34" font-weight="600" fill="#e8e8ea">
    <text x="120" y="790">Original</text>
    <circle cx="320" cy="778" r="5" fill="#C9A84C"/>
    <text x="350" y="790">Kafolat bilan</text>
    <circle cx="620" cy="778" r="5" fill="#C9A84C"/>
    <text x="650" y="790">Tezkor yetkazish</text>
  </g>
</svg>
