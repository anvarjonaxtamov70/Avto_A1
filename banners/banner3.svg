<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1618 1000" width="1618" height="1000" font-family="Montserrat, 'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="b3bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#191920"/>
      <stop offset="0.55" stop-color="#101015"/>
      <stop offset="1" stop-color="#0a0a0d"/>
    </linearGradient>
    <radialGradient id="b3glow" cx="0.78" cy="0.45" r="0.62">
      <stop offset="0" stop-color="#C9A84C" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="b3gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4D873"/>
      <stop offset="0.5" stop-color="#C9A84C"/>
      <stop offset="1" stop-color="#9A7611"/>
    </linearGradient>
    <path id="b3star" d="M 0 -1 L 0.2245 -0.309 L 0.951 -0.309 L 0.3633 0.1181 L 0.588 0.809 L 0 0.382 L -0.588 0.809 L -0.3633 0.1181 L -0.951 -0.309 L -0.2245 -0.309 Z"/>
    <clipPath id="b3clipRu"><rect width="420" height="232" rx="22"/></clipPath>
    <clipPath id="b3clipCn"><rect width="420" height="232" rx="22"/></clipPath>
  </defs>

  <rect width="1618" height="1000" fill="url(#b3bg)"/>
  <rect width="1618" height="1000" fill="url(#b3glow)"/>
  <circle cx="1480" cy="120" r="200" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="2"/>

  <!-- ===== Matn bloki ===== -->
  <text x="110" y="208" fill="#C9A84C" font-size="30" font-weight="700" letter-spacing="5">TO&#8216;G&#8216;RIDAN-TO&#8216;G&#8216;RI ZAVODDAN</text>

  <text x="106" y="338" fill="#ffffff" font-size="92" font-weight="800" letter-spacing="1">ROSSIYA <tspan fill="#C9A84C">&amp;</tspan> XITOY</text>
  <text x="110" y="452" fill="url(#b3gold)" font-size="92" font-weight="800" letter-spacing="1">TOVARLARI</text>

  <g fill="#cdcdd3" font-size="37" font-weight="500">
    <text x="110" y="528">Sinovdan o&#8216;tgan sifat, keng assortiment va</text>
    <text x="110" y="584">eng kerakli ehtiyot qismlar doimo omborda.</text>
  </g>

  <!-- ===== Feature chip'lar ===== -->
  <g transform="translate(110 668)" font-size="28" font-weight="700">
    <g>
      <rect width="300" height="74" rx="37" fill="#ffffff" fill-opacity="0.04" stroke="#C9A84C" stroke-opacity="0.5" stroke-width="1.5"/>
      <circle cx="42" cy="37" r="7" fill="#C9A84C"/>
      <text x="72" y="47" fill="#ececef">Sertifikatlangan</text>
    </g>
    <g transform="translate(324 0)">
      <rect width="316" height="74" rx="37" fill="#ffffff" fill-opacity="0.04" stroke="#C9A84C" stroke-opacity="0.5" stroke-width="1.5"/>
      <circle cx="42" cy="37" r="7" fill="#C9A84C"/>
      <text x="72" y="47" fill="#ececef">Keng assortiment</text>
    </g>
  </g>
  <g transform="translate(110 758)" font-size="28" font-weight="700">
    <rect width="300" height="74" rx="37" fill="#ffffff" fill-opacity="0.04" stroke="#C9A84C" stroke-opacity="0.5" stroke-width="1.5"/>
    <circle cx="42" cy="37" r="7" fill="#C9A84C"/>
    <text x="72" y="47" fill="#ececef">Omborda mavjud</text>
  </g>

  <!-- ===== Bayroq kartalari ===== -->
  <!-- Rossiya -->
  <g transform="translate(1050 150)">
    <g clip-path="url(#b3clipRu)">
      <rect width="420" height="232" fill="#ffffff"/>
      <rect y="77.3" width="420" height="77.3" fill="#0039A6"/>
      <rect y="154.6" width="420" height="77.4" fill="#D52B1E"/>
    </g>
    <rect width="420" height="232" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
    <g transform="translate(20 168)">
      <rect width="200" height="48" rx="24" fill="#0a0a0d" fill-opacity="0.78"/>
      <text x="100" y="32" fill="#ffffff" font-size="26" font-weight="800" text-anchor="middle" letter-spacing="2">ROSSIYA</text>
    </g>
  </g>

  <!-- Xitoy -->
  <g transform="translate(1050 432)">
    <g clip-path="url(#b3clipCn)">
      <rect width="420" height="232" fill="#DE2910"/>
      <use href="#b3star" transform="translate(78 70) scale(34) rotate(0)" fill="#FFDE00"/>
      <use href="#b3star" transform="translate(150 28) scale(13) rotate(24)" fill="#FFDE00"/>
      <use href="#b3star" transform="translate(182 60) scale(13) rotate(46)" fill="#FFDE00"/>
      <use href="#b3star" transform="translate(174 102) scale(13) rotate(70)" fill="#FFDE00"/>
      <use href="#b3star" transform="translate(138 130) scale(13) rotate(21)" fill="#FFDE00"/>
    </g>
    <rect width="420" height="232" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
    <g transform="translate(20 168)">
      <rect width="160" height="48" rx="24" fill="#0a0a0d" fill-opacity="0.78"/>
      <text x="80" y="32" fill="#ffffff" font-size="26" font-weight="800" text-anchor="middle" letter-spacing="2">XITOY</text>
    </g>
  </g>

  <!-- bayroqlar orasidagi sifat belgisi -->
  <g transform="translate(1260 392)">
    <circle r="40" fill="url(#b3gold)"/>
    <circle r="40" fill="none" stroke="#0a0a0d" stroke-opacity="0.25" stroke-width="3"/>
    <polyline points="-17,2 -5,15 18,-14" fill="none" stroke="#15110a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
