<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1618 1000" width="1618" height="1000" font-family="Montserrat, Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1c1e"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gold3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0D060"/>
      <stop offset="0.45" stop-color="#C9A84C"/>
      <stop offset="1" stop-color="#96720A"/>
    </linearGradient>
    <radialGradient id="glow3" cx="0.8" cy="0.7" r="0.6">
      <stop offset="0" stop-color="#C9A84C" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1618" height="1000" fill="url(#bg3)"/>
  <rect width="1618" height="1000" fill="url(#glow3)"/>

  <!-- Yo'l chiziqlari -->
  <g stroke="url(#gold3)" stroke-opacity="0.3" stroke-width="14" stroke-dasharray="60 50">
    <line x1="0" y1="900" x2="1618" y2="900"/>
  </g>

  <text x="120" y="300" fill="#8e8e93" font-size="44" font-weight="600" letter-spacing="8">YETKAZIB BERISH XIZMATI</text>

  <text x="116" y="470" fill="url(#gold3)" font-size="150" font-weight="800">TEZKOR</text>
  <text x="120" y="610" fill="#ffffff" font-size="92" font-weight="800">YETKAZIB BERISH</text>

  <text x="120" y="710" fill="#8e8e93" font-size="44" font-weight="500">Butun O'zbekiston bo'ylab — 24/48 soat ichida</text>

  <!-- Yuk mashinasi ikonkasi -->
  <g transform="translate(1120 560)" fill="none" stroke="url(#gold3)" stroke-width="16" stroke-linejoin="round" stroke-linecap="round">
    <rect x="0" y="0" width="240" height="170" rx="12"/>
    <path d="M240 50 H330 L390 120 V170 H240 Z"/>
    <circle cx="80" cy="200" r="42" fill="#0a0a0a"/>
    <circle cx="320" cy="200" r="42" fill="#0a0a0a"/>
  </g>

  <!-- Kafolat pill -->
  <g transform="translate(120 760)">
    <rect width="430" height="84" rx="42" fill="none" stroke="url(#gold3)" stroke-width="4"/>
    <text x="215" y="55" fill="#F0D060" font-size="36" font-weight="700" text-anchor="middle" letter-spacing="2">100% KAFOLAT</text>
  </g>
</svg>
