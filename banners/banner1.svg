<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1618 1000" width="1618" height="1000" font-family="Montserrat, Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1c1e"/>
      <stop offset="0.55" stop-color="#121212"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0D060"/>
      <stop offset="0.45" stop-color="#C9A84C"/>
      <stop offset="1" stop-color="#96720A"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.78" cy="0.3" r="0.6">
      <stop offset="0" stop-color="#C9A84C" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1618" height="1000" fill="url(#bg1)"/>
  <rect width="1618" height="1000" fill="url(#glow1)"/>

  <!-- Dekorativ katta tishli g'ildirak (gear) -->
  <g transform="translate(1290 500)" fill="none" stroke="url(#gold1)" stroke-opacity="0.45" stroke-width="10">
    <circle r="300"/>
    <circle r="210"/>
    <g stroke-width="36">
      <line x1="0" y1="-300" x2="0" y2="-360"/>
      <line x1="0" y1="300" x2="0" y2="360"/>
      <line x1="-300" y1="0" x2="-360" y2="0"/>
      <line x1="300" y1="0" x2="360" y2="0"/>
      <line x1="-212" y1="-212" x2="-255" y2="-255"/>
      <line x1="212" y1="212" x2="255" y2="255"/>
      <line x1="-212" y1="212" x2="-255" y2="255"/>
      <line x1="212" y1="-212" x2="255" y2="-255"/>
    </g>
  </g>

  <!-- Yuqori gold chiziq -->
  <rect x="110" y="250" width="120" height="10" rx="5" fill="url(#gold1)"/>

  <text x="110" y="320" fill="#8e8e93" font-size="40" font-weight="600" letter-spacing="8">PREMIUM AVTO ZAPCHASTLAR</text>

  <text x="106" y="540" fill="url(#gold1)" font-size="220" font-weight="800" letter-spacing="4">AVTO A1</text>

  <text x="110" y="640" fill="#ffffff" font-size="58" font-weight="700">Original sifat. Ishonchli kafolat.</text>

  <!-- CTA pill -->
  <g transform="translate(110 720)">
    <rect width="520" height="92" rx="46" fill="url(#gold1)"/>
    <text x="260" y="60" fill="#121212" font-size="40" font-weight="800" text-anchor="middle" letter-spacing="2">HOZIROQ XARID QILING</text>
  </g>
</svg>
