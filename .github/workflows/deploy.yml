name: Deploy to GitHub Pages

# Har safar main'ga push bo'lganda avtomatik ishlaydi.
# Qo'lda ham ishga tushirish mumkin (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages uchun zarur ruxsatlar
permissions:
  contents: read
  pages: write
  id-token: write

# Bir vaqtda faqat bitta deploy borishini kafolatlash
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage site (CI fayllari va bot papkalari chiqarib tashlanadi)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            --exclude 'bot' \
            --exclude 'ivy_jewelry_cosmetics/.github' \
            --exclude 'ivy_jewelry_cosmetics/bot' \
            --exclude 'music_bot' \
            ./ _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Avto A1 + Ivy saytlari (bot/CI fayllarisiz)
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
