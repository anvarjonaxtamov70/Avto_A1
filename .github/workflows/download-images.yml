name: Rasmlarni o'z hostingiga yuklab olish

# Qo'lda ishga tushiriladi: Actions -> bu workflow -> "Run workflow"
# postimg.cc dagi rasmlarni assets/img/ ga yuklab, shu branchga commit qiladi.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rasmlarni yuklab olish
        run: bash scripts/download-images.sh

      - name: O'zgarishlarni commit qilish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain assets/img)" ]; then
            git add assets/img
            git commit -m "assets: rasmlarni o'z hostingiga (postimg -> assets/img) ko'chirish"
            git push
            echo "Rasmlar commit qilindi va push qilindi."
          else
            echo "O'zgarish yo'q — rasmlar allaqachon mavjud."
          fi
