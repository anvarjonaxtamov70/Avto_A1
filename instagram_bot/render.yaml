# =====================================================================
#  📸 Instagram Bot — Render.com deploy konfiguratsiyasi
#  Docker runtime (ffmpeg kerak). Health-check /health orqali.
# =====================================================================
services:
  - type: web
    name: instagram-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false          # Render dashboard'da qo'lda kiriting (maxfiy)
      - key: ADMIN_ID
        sync: false
      - key: IG_COOKIES_CONTENT
        sync: false          # Instagram cookies (ixtiyoriy)
      - key: PROXY_URL
        sync: false          # residential proxy (ixtiyoriy)
      - key: KEEP_ALIVE_INTERVAL
        value: "300"
